<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>College AI Chatbot</title>

<link rel="stylesheet" href="/static/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:"Poppins",sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-container{
display:flex;
justify-content:center;
align-items:center;
}

.login-card{
background:#1e293b;
padding:40px;
border-radius:12px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
animation:fadeIn 0.6s ease;
}

.title{
text-align:center;
color:#2563eb;
margin-bottom:10px;
}

.subtitle{
text-align:center;
font-size:14px;
color:#94a3b8;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
outline:none;
background:#334155;
color:white;
}

.password-box{
position:relative;
}

.password-box span{
position:absolute;
right:10px;
top:14px;
cursor:pointer;
}

button{
width:100%;
margin-top:20px;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
}

.error{
color:#ef4444;
text-align:center;
margin-top:10px;
}

.forgot{
text-align:center;
margin-top:10px;
font-size:13px;
}

.forgot a{
color:#10b981;
text-decoration:none;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div class="login-container">

<div class="login-card">

<h1 class="title">AI College Assistant</h1>

<p class="subtitle">Login with your AIDS department email</p>

<input id="email" type="email" placeholder="aids@dgct.ac.in email">

<div class="password-box">
<input id="password" type="password" placeholder="Password">
<span onclick="togglePassword()">👁</span>
</div>

<button id="loginBtn" onclick="login()">Login</button>

<p class="forgot">
<a href="/static/forgot.html">Forgot Password?</a>
</p>

<p id="error" class="error"></p>

</div>

</div>

<script src="/static/login.js"></script>

<script>

function togglePassword(){

let p=document.getElementById("password")

if(p.type==="password"){
p.type="text"
}else{
p.type="password"
}

}

</script>

</body>
</html>
