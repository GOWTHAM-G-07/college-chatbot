<!DOCTYPE html>
<html>

<head>
<title>College Chatbot</title>
<link rel="stylesheet" href="style.css">

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-container{
width:600px;
background:#1e293b;
padding:20px;
border-radius:10px;
}

.chat-box{
height:350px;
overflow-y:auto;
background:#020617;
padding:10px;
border-radius:6px;
margin-bottom:10px;
}

.message{
margin:10px 0;
}

.question{
text-align:left;
background:#3498db;
color:white;
padding:10px;
border-radius:10px;
margin:10px 0;
max-width:70%;
}

.answer{
text-align:right;
background:#2ecc71;
color:white;
padding:10px;
border-radius:10px;
margin:10px 0;
margin-left:auto;
max-width:70%;
}

input{
width:75%;
padding:10px;
border:none;
border-radius:5px;
}

button{
padding:10px;
background:#38bdf8;
border:none;
border-radius:5px;
cursor:pointer;
}

.mode{
margin-top:10px;
}
.message{
animation:fadeIn 0.4s ease-in;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="chat-container">

<h2>College Chatbot</h2>

<div id="chatBox" class="chat-box"></div>

<input id="question" placeholder="Ask something...">
<button onclick="sendQuestion()">Send</button>

<div class="mode">
<label>
<input type="checkbox" id="aiMode">
AI Mode
</label>
</div>

</div>

<script src="chat.js"></script>

</body>
</html>
