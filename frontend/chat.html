<!DOCTYPE html>
<html>

<head>

<title>College Chatbot</title>

<link rel="stylesheet" href="style.css">

<style>

/* PAGE */

body{
font-family: Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* CHAT CARD */

.chat-container{
width:650px;
background:#1e293b;
padding:20px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* CHAT BOX */

.chat-box{
height:400px;
overflow-y:auto;
background:#020617;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

/* MESSAGE ANIMATION */

.message{
animation:fadeIn 0.3s ease-in;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* USER MESSAGE */

.question{
background:#2563eb;
color:white;
padding:10px 14px;
border-radius:12px;
margin:8px 0;
max-width:70%;
}

/* BOT MESSAGE */

.answer{
background:#10b981;
color:white;
padding:10px 14px;
border-radius:12px;
margin:8px 0;
margin-left:auto;
max-width:70%;
}

/* INPUT AREA */

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:14px;
}

/* SEND BUTTON */

button{
background:#9333ea;
color:white;
padding:12px 16px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#7e22ce;
}

/* MODE SWITCH */

.mode{
margin-top:12px;
font-size:14px;
}

/* DOCUMENT LIST */

.docs{
margin-top:20px;
background:#020617;
padding:10px;
border-radius:10px;
}

.doc-item{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #1e293b;
}

.doc-item button{
margin-left:6px;
}

</style>

</head>

<body>

<div class="chat-container">

<h2>College Chatbot</h2>

<div id="chatBox" class="chat-box"></div>

<div class="input-area">

<input id="question" placeholder="Ask something...">

<button onclick="sendQuestion()">Send</button>

</div>

<div class="mode">

<label>
<input type="checkbox" id="aiMode">
AI Mode
</label>

</div>

<hr>

<h3>Available Documents</h3>

<div id="docs" class="docs"></div>

</div>

<script src="chat.js"></script>
<script src="docs.js"></script>

<script>
loadDocs()
</script>

</body>

</html>
