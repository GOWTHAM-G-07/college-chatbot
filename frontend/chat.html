<!DOCTYPE html>
<html>
<head>
<title>College Chatbot</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main">

  <!-- TOP -->
  <h1 style="text-align:center;">College Chatbot</h1>

  <!-- AI STATUS -->
  <div id="aiStatus" style="text-align:center; margin-bottom:10px; color:#00d4ff;">
    🧠 AI Active
  </div>

  <!-- MODE TOGGLE -->
  <div class="mode-toggle" style="display:flex; justify-content:center; gap:10px; margin-bottom:15px;">
    <button id="aiBtn" class="active">AI Mode</button>
    <button id="docBtn">Document Mode</button>
  </div>

  <!-- CHAT CARD -->
  <div class="glass chat-container">

    <div id="chatBox" class="chat-box"></div>

    <div class="chat-input">
      <input id="question" placeholder="Ask something...">
      <button onclick="sendQuestion()">Send</button>
    </div>

  </div>

  <!-- DOCUMENTS -->
  <div class="glass" style="margin-top:20px;">
    <h3>Available Documents</h3>
    <div id="docs" class="docs"></div>
  </div>

</div>

<script src="chat.js"></script>
<script src="docs.js"></script>

<script>
loadDocs()
</script>

<script>

/* =========================
   MODE SYSTEM
========================= */

let currentMode = "ai";

const aiBtn = document.getElementById("aiBtn");
const docBtn = document.getElementById("docBtn");
const status = document.getElementById("aiStatus");

aiBtn.onclick = () => {
  currentMode = "ai";
  updateMode();
};

docBtn.onclick = () => {
  currentMode = "doc";
  updateMode();
};

function updateMode() {
  aiBtn.classList.remove("active");
  docBtn.classList.remove("active");

  if (currentMode === "ai") {
    aiBtn.classList.add("active");
    status.innerText = "🧠 AI Active";
  } else {
    docBtn.classList.add("active");
    status.innerText = "📄 Document Mode";
  }
}

/* =========================
   MODIFY SEND FUNCTION
========================= */

async function sendQuestion() {

  let input = document.getElementById("question");
  let question = input.value;

  if (!question) return;

  addMessage(question, "question");

  input.value = "";

  let res = await fetch("http://127.0.0.1:8000/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      question: question,
      mode: currentMode   // 🔥 IMPORTANT
    })
  });

  let data = await res.json();

  addMessage(data.answer, "answer");
}

/* =========================
   MESSAGE UI
========================= */

function addMessage(text, type) {
  let box = document.getElementById("chatBox");

  let div = document.createElement("div");
  div.className = type + " message";
  div.innerText = text;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

</script>

</body>
</html>
