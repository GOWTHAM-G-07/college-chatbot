<!DOCTYPE html>
<html>
<head>
  <title>College Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =========================
     MAIN CONTENT
========================= -->
<div class="main">

  <div class="content">

    <!-- TITLE -->
    <div class="title">College Chatbot</div>
    <div id="aiStatus" class="subtitle">🧠 AI Active</div>

    <!-- MODE -->
    <div style="text-align:center; margin-bottom:15px;">
      <button id="aiBtn" class="active">AI Mode</button>
      <button id="docBtn">Document Mode</button>
    </div>

    <!-- CHAT BOX -->
    <div class="glass">

      <div id="chatBox" style="height:300px; overflow-y:auto; margin-bottom:10px;"></div>

      <div style="display:flex;">
        <input id="question" placeholder="Ask something..." style="flex:1;">
        <button onclick="sendQuestion()">Send</button>
      </div>

    </div>

    <!-- DOCUMENTS -->
    <div class="glass">
      <h3>Available Documents</h3>
      <div id="docs"></div>
    </div>

  </div>

</div>

<!-- =========================
     SCRIPTS (IMPORTANT ORDER)
========================= -->
<script src="layout.js"></script>
<script src="docs.js"></script>

<script>
window.onload = () => {

  // ✅ Load sidebar (role-based)
  loadLayout();

  // ✅ Load documents
  loadDocs();

  // =========================
  // MODE SYSTEM
  // =========================
  let currentMode = "ai";

  const aiBtn = document.getElementById("aiBtn");
  const docBtn = document.getElementById("docBtn");
  const status = document.getElementById("aiStatus");

  aiBtn.onclick = () => {
    currentMode = "ai";
    updateMode();
  };

  docBtn.onclick = () => {
    currentMode = "doc";
    updateMode();
  };

  function updateMode() {
    aiBtn.classList.remove("active");
    docBtn.classList.remove("active");

    if (currentMode === "ai") {
      aiBtn.classList.add("active");
      status.innerText = "🧠 AI Active";
    } else {
      docBtn.classList.add("active");
      status.innerText = "📄 Document Mode";
    }
  }

  // =========================
  // SEND QUESTION
  // =========================
  window.sendQuestion = async function () {

    const input = document.getElementById("question");
    const question = input.value;

    if (!question) return;

    addMessage(question, "user");
    input.value = "";

    try {
      const res = await fetch("http://127.0.0.1:8000/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + localStorage.getItem("token")
        },
        body: JSON.stringify({
          question: question,
          mode: currentMode
        })
      });

      const data = await res.json();

      addMessage(data.answer || "No response", "bot");

    } catch (err) {
      console.error(err);
      addMessage("Server error", "bot");
    }
  };

  // =========================
  // MESSAGE UI
  // =========================
  function addMessage(text, type) {
    const box = document.getElementById("chatBox");

    const div = document.createElement("div");

    div.style.margin = "6px";
    div.style.padding = "8px";
    div.style.borderRadius = "8px";

    if (type === "user") {
      div.style.background = "#38bdf8";
      div.style.color = "black";
      div.style.textAlign = "right";
    } else {
      div.style.background = "#22c55e";
      div.style.color = "black";
    }

    div.innerText = text;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

};
<script src="/static/auth.js"></script>
<script src="/static/layout.js"></script>
<script src="/static/chat.js"></script>

<script>
window.onload = function() {
  loadLayout();
  checkAuth();
};
</script>

</body>
</html>
