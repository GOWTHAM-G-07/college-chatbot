<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="/static/style.css">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.container{
width:1100px;
margin:auto;
margin-top:40px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.section{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:25px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

button.delete{
background:#ef4444;
}

.item{
display:flex;
justify-content:space-between;
background:#334155;
padding:10px;
margin-top:10px;
border-radius:6px;
}

</style>

</head>

<body>
<div class="main">

<h1>ASTROZ CHAT BOT</h1>

<div class="container">

<h1>Admin Dashboard</h1>

<!-- Upload Documents -->

<div class="section">

<h2>Upload PDF</h2>

<input id="title" placeholder="Document Title">

<input type="file" id="file">

<button onclick="upload()">Upload</button>

</div>

<!-- Documents -->

<div class="section">

<h2>Documents</h2>

<div id="docs"></div>

</div>

<!-- Users -->

<div class="section">

<h2>Users</h2>

<button onclick="loadUsers()">Refresh Users</button>

<div id="users"></div>

</div>

<!-- Add User -->

<div class="section">

<h2>Add User</h2>

<input id="newEmail" placeholder="Email">

<input id="newPassword" placeholder="Password">

<select id="role">

<option value="user">User</option>
<option value="leader">Leader</option>

</select>

<button onclick="addUser()">Add User</button>

</div>

<!-- Chat History -->

<div class="section">

<h2>Chat History</h2>

<button onclick="loadHistory()">Load History</button>

<div id="history"></div>

</div>

</div>

<script>

function initAdmin(){

const API="http://127.0.0.1:8000"
const token=localStorage.getItem("token")

// -----------------------------
// Load Documents
// -----------------------------
async function loadDocs(){

let res = await fetch(API + "/admin/docs",{
headers:{
Authorization:"Bearer "+token
}
})

let docs = await res.json()

let container = document.getElementById("docs")
container.innerHTML=""

let role = localStorage.getItem("role")

docs.forEach(doc=>{
container.innerHTML += `
<div class="item">
<div>
<b>${doc.title}</b><br>
${doc.filename}
</div>

<div>
<a href="/documents/preview/${doc.id}" target="_blank">
<button>Preview</button>
</a>

<a href="/documents/download/${doc.id}">
<button>Download</button>
</a>

${role === "admin" ? `
<button class="delete" onclick="deleteDoc(${doc.id})">
Delete
</button>
` : ""}

</div>
</div>
`
})
}

// expose globally (IMPORTANT)
window.loadDocs = loadDocs

// -----------------------------
async function deleteDoc(id){
if(!confirm("Delete?")) return

await fetch(API+"/admin/delete/"+id,{
method:"DELETE",
headers:{Authorization:"Bearer "+token}
})

loadDocs()
}

window.deleteDoc = deleteDoc

// -----------------------------
loadDocs()

}

</script>
<script src="layout.js"></script>
<script src="particles.js"></script>  <!-- IMPORTANT -->
<script src="admin.js"></script>
<script>

loadLayout()     // sidebar + background
initAdmin()      // your admin logic

</script>
