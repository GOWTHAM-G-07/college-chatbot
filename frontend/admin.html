<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="/static/style.css">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.container{
width:1100px;
margin:auto;
margin-top:40px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.section{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:25px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

button.delete{
background:#ef4444;
}

.item{
display:flex;
justify-content:space-between;
background:#334155;
padding:10px;
margin-top:10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

<!-- Upload Documents -->

<div class="section">

<h2>Upload PDF</h2>

<input id="title" placeholder="Document Title">

<input type="file" id="file">

<button onclick="upload()">Upload</button>

</div>

<!-- Documents -->

<div class="section">

<h2>Documents</h2>

<div id="docs"></div>

</div>

<!-- Users -->

<div class="section">

<h2>Users</h2>

<button onclick="loadUsers()">Refresh Users</button>

<div id="users"></div>

</div>

<!-- Add User -->

<div class="section">

<h2>Add User</h2>

<input id="newEmail" placeholder="Email">

<input id="newPassword" placeholder="Password">

<select id="role">

<option value="user">User</option>
<option value="leader">Leader</option>

</select>

<button onclick="addUser()">Add User</button>

</div>

<!-- Chat History -->

<div class="section">

<h2>Chat History</h2>

<button onclick="loadHistory()">Load History</button>

<div id="history"></div>

</div>

</div>

<script>

const API="http://127.0.0.1:8000"

const token=localStorage.getItem("token")

// -----------------------------
// Upload Document
// -----------------------------

async function upload(){

let title=document.getElementById("title").value
let file=document.getElementById("file").files[0]

let form=new FormData()

form.append("title",title)
form.append("file",file)

let res=await fetch(API+"/admin/upload",{
method:"POST",
headers:{
Authorization:"Bearer "+token
},
body:form
})

alert("Upload successful")

loadDocs()

}


// -----------------------------
// Load Documents
// -----------------------------

async function loadDocs(){

let res=await fetch(API+"/admin/docs")

let docs=await res.json()

let container=document.getElementById("docs")

container.innerHTML=""

docs.forEach(doc=>{

container.innerHTML+=`

<div class="item">

<div>

<b>${doc.title}</b><br>
${doc.filename}

</div>

<div>

<button class="delete" onclick="deleteDoc(${doc.id})">Delete</button>

</div>

</div>

`

})

}


// -----------------------------
// Delete Document
// -----------------------------

async function deleteDoc(id){

let confirmDelete=confirm("Delete this document?")

if(!confirmDelete) return

await fetch(API+"/admin/delete/"+id,{
method:"DELETE"
})

loadDocs()

}


// -----------------------------
// Load Users
// -----------------------------

async function loadUsers(){

let res=await fetch(API+"/auth/admin/users",{
headers:{
Authorization:"Bearer "+token
}
})

let users=await res.json()

let container=document.getElementById("users")

container.innerHTML=""

Object.keys(users).forEach(email=>{

container.innerHTML+=`

<div class="item">

<div>

${email} — ${users[email].role}

</div>

<div>

<button class="delete" onclick="removeUser('${email}')">Remove</button>

</div>

</div>

`

})

}


// -----------------------------
// Add User
// -----------------------------

async function addUser(){

let email=document.getElementById("newEmail").value
let password=document.getElementById("newPassword").value
let role=document.getElementById("role").value

await fetch(API+"/auth/admin/add-user",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({
email:email,
password:password,
role:role
})
})

alert("User added")

loadUsers()

}


// -----------------------------
// Remove User
// -----------------------------

async function removeUser(email){

await fetch(API+"/auth/admin/remove-user/"+email,{
method:"DELETE",
headers:{
Authorization:"Bearer "+token
}
})

alert("User removed")

loadUsers()

}


// -----------------------------
// Load Chat History
// -----------------------------

async function loadHistory(){

let res=await fetch(API+"/auth/admin/chat-history",{
headers:{
Authorization:"Bearer "+token
}
})

let history=await res.json()

let container=document.getElementById("history")

container.innerHTML=""

history.forEach(log=>{

container.innerHTML+=`

<div class="item">

<div>

<b>${log.email}</b><br>
${log.query}<br>
<small>${log.time}</small>

</div>

</div>

`

})

}


loadDocs()

</script>

</body>
</html>
