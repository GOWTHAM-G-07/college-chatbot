<body>
<div class="main">

<h1>ASTROZ CHAT BOT</h1>

<div class="container">
<div class="main">

<h2>Admin Dashboard</h2>

<div class="stats">

<div class="card">
<h3>📄 Documents</h3>
<p id="docCount">0</p>
</div>

<div class="card">
<h3>👥 Users</h3>

</div>

<div class="row header">
<span>Name</span>

<span>Action</span>
</div>

</div>

</div>

<!-- Users -->

</div>

</select>

<!-- Chat History -->

<div class="section">

<h2>Chat History</h2>

<button onclick="loadHistory()">Load History</button>

<div id="history"></div>

</div>

</div>

<script>

function initAdmin(){

const API="http://127.0.0.1:8000"
const token=localStorage.getItem("token")

// -----------------------------
// Load Documents
// -----------------------------
async function loadDocs(){

let res = await fetch(API + "/admin/docs",{
headers:{
Authorization:"Bearer "+token
}
})

let docs = await res.json()

let container = document.getElementById("docs")
container.innerHTML=""

let role = localStorage.getItem("role")

docs.forEach(doc=>{

container.innerHTML += `

<div class="row">

<span>${doc.title}</span>

<span>Today</span>

<span>

<a href="/documents/preview/${doc.id}" target="_blank">
<button>Preview</button>
</a>

<a href="/documents/download/${doc.id}">
<button>Download</button>
</a>

${role === "admin" ? `
<button class="delete" onclick="deleteDoc(${doc.id})">
Delete
</button>
` : ""}

</span>

</div>

`

})

}

// expose globally (IMPORTANT)
window.loadDocs = loadDocs

// -----------------------------
async function deleteDoc(id){
if(!confirm("Delete?")) return

await fetch(API+"/admin/delete/"+id,{
method:"DELETE",
headers:{Authorization:"Bearer "+token}
})

loadDocs()
}

window.deleteDoc = deleteDoc

// -----------------------------
loadDocs()

}

</script>
<script src="layout.js"></script>

loadLayout()     // sidebar + background

</script>
