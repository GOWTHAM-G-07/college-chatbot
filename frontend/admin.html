<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

  <div class="main">
    <div class="content">

      <!-- TOPBAR -->
      <div class="topbar">
        <div class="search">
          <input placeholder="Search...">
        </div>

        <div class="top-right">
          <span>🔔</span>
          <span>⚙️</span>
          <span class="profile">Admin</span>
        </div>
      </div>

      <!-- TITLE -->
      <h1 class="title">ASTROZ AI</h1>
      <h3 style="color:#94a3b8;">Welcome back, Admin</h3>
      <p style="text-align:center; color:#a0a7c0;">Admin Dashboard</p>

      <!-- STATS -->
      <div class="stats">
        <div class="glass stat-card">
          <h3>📄 Documents</h3>
          <h2 id="docCount">0</h2>
        </div>

        <div class="glass stat-card">
          <h3>📢 Announcements</h3>
          <h2 id="announceCount">0</h2>
        </div>
      </div>

      <!-- UPLOAD -->
      <div class="glass upload-box">
        <h3>Upload PDF</h3>

        <input id="title" placeholder="Document Title">
        <input type="file" id="file">
        <button onclick="uploadAdmin()" class="upload-btn">Upload</button>
      </div>

      <!-- MAIN GRID -->
      <div style="display:grid; grid-template-columns:2fr 1fr; gap:20px; margin-top:20px;">

        <!-- DOCUMENTS -->
        <div class="glass">
          <h2>Documents</h2>

          <div class="table">
            <div class="row header">
              <span>Name</span>
              <span>Date</span>
              <span>Action</span>
            </div>

            <div id="docs"></div>
          </div>
        </div>
        
        <!-- USERS -->
        <div class="glass">
          <h2>Users</h2>

          <button onclick="loadUsers()">Refresh</button>
          <div id="users"></div>
        </div>

      </div>

      <!-- ADD USER -->
      <div class="glass" style="margin-top:20px;">
        <h2>Add User</h2>
        <input id="newName" placeholder="Name (optional)">
        <input id="newEmail" placeholder="Email">
        <input id="newPassword" placeholder="Password">

        <!-- ✅ ADD THIS -->
        <select id="role">
          <option value="user">User</option>
        </select>

        <button onclick="addUser()">Add User</button>
      </div>

      <!-- CHAT HISTORY -->
      <div class="glass" style="margin-top:20px;">
        <h2>Chat History</h2>

        <button onclick="loadHistory()">Load History</button>
        <div id="history"></div>
      </div>

    </div> <!-- ✅ content CLOSE HERE -->
  </div> <!-- main -->

  <script>

    function initAdmin() {

      const API = "http://127.0.0.1:8000"
      const token = localStorage.getItem("token")

      async function loadDocs() {

        let res = await fetch(API + "/admin/docs", {
          headers: { Authorization: "Bearer " + token }
        })

        let docs = await res.json()

        let container = document.getElementById("docs")
        container.innerHTML = ""

        let role = localStorage.getItem("role")

        docs.forEach(doc => {

          container.innerHTML += `
<div class="row">
  <span>${doc.title}</span>
  <span>Today</span>
  <span>
    <a href="/documents/preview/${doc.id}" target="_blank">
      <button>Preview</button>
    </a>

    <a href="/documents/download/${doc.id}">
      <button>Download</button>
    </a>

    ${role === "admin" ? `
     <button class="delete" onclick="deleteDoc(${doc.id})">
        Delete
      </button>
    ` : ""}
  </span>
</div>
`

        })

      }



      window.deleteDoc = deleteDoc

      loadDocs()
    }

  </script>

  <script src="layout.js"></script>
  <script src="/static/admin.js"></script>

  <script>
    loadLayout()
    initAdmin()
  </script>
  <script src="/static/auth.js"></script>
<script>
checkAuth("admin")
</script>

</body>

</html>
