<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:0;
}

.container{
width:900px;
margin:auto;
margin-top:40px;
}

h1{
text-align:center;
}

.upload-box{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:30px;
}

.docs-box{
background:#1e293b;
padding:20px;
border-radius:10px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

button.delete{
background:#ef4444;
}

.doc-item{
display:flex;
justify-content:space-between;
background:#334155;
padding:10px;
margin-top:10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

<div class="upload-box">

<h2>Upload PDF</h2>

<input id="title" placeholder="Document Title">

<input type="file" id="file">

<button onclick="upload()">Upload</button>

</div>

<div class="docs-box">

<h2>Uploaded Documents</h2>

<div id="docs"></div>

</div>

</div>

<script>

async function upload(){

let title = document.getElementById("title").value
let file = document.getElementById("file").files[0]

let form = new FormData()

form.append("title",title)
form.append("file",file)

let res = await fetch("http://127.0.0.1:8000/admin/upload",{
method:"POST",
body:form
})

let data = await res.json()

alert("Upload successful")

loadDocs()

}


async function loadDocs(){

let res = await fetch("http://127.0.0.1:8000/admin/docs")

let docs = await res.json()

let container = document.getElementById("docs")

container.innerHTML=""

docs.forEach(doc=>{

container.innerHTML+=`

<div class="doc-item">

<div>

<b>${doc.title}</b><br>
${doc.filename}

</div>

<div>

<button class="delete" onclick="deleteDoc(${doc.id})">Delete</button>

</div>

</div>

`

})

}


async function deleteDoc(id){

let confirmDelete = confirm("Delete this document?")

if(!confirmDelete) return

await fetch(`http://127.0.0.1:8000/admin/delete/${id}`,{
method:"DELETE"
})

alert("Document deleted")

loadDocs()

}

loadDocs()

</script>

</body>
</html>
